<table mat-table [dataSource]="dataSource()" matSort class="mat-elevation-z8">
  <!-- Actions Column -->
  <ng-container matColumnDef="actions" sticky>
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let entity">
      <app-button [icon]="'visibility'" [tooltip]="'View Details'" (buttonClick)="onViewDetails(entity)"></app-button>
      <app-button [variant]="'primary'" [icon]="'edit'" [tooltip]="'Edit'" (buttonClick)="onEdit(entity)"></app-button>
      <app-button [variant]="'destructive'" [icon]="'delete'" [tooltip]="'Delete'"
        (buttonClick)="onRemove(entity)"></app-button>
    </td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>
      Name
      <mat-icon matSortHeaderIcon>keyboard_arrow_up</mat-icon>
    </th>
    <td mat-cell *matCellDef="let entity">{{ entity.name }}</td>
  </ng-container>

  <!-- Dynamic Property Columns -->
  <ng-container *ngFor="let column of propertyColumns(); trackBy: trackByColumn" [matColumnDef]="column">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>
      {{ column | titlecase }}
      <mat-icon matSortHeaderIcon>keyboard_arrow_up</mat-icon>
    </th>
    <td mat-cell *matCellDef="let entity">{{ getPropertyValue(entity, column) }}</td>
  </ng-container>


  <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>
</table>
