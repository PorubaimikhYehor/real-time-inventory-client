<mat-nav-list>
  @for (item of items; track item?.label) {
  <a mat-list-item [routerLink]="item.routerLink" [activated]="active == item.routerLink" class="hover:bg-gray-100 mb-2" routerLinkActive
    (isActiveChange)="onActiveChange(item.routerLink, $event)">
    <mat-icon matListItemIcon class="mr-2">{{ item.icon }}</mat-icon>
    {{ item.label }}
  </a>
  }
</mat-nav-list>
